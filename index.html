<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>plagesducotentin.fr - Cotentin Web Studio</title>
    
    <!-- PWA / Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Couleur de la barre d'état sur smartphone (notre Bleu Marine) -->
    <meta name="theme-color" content="#1e3a8a">
    
    <!-- Icônes pour Apple (iOS) et Android (Favicon) -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="shortcut icon" href="favicon.ico">
    
    <!-- CSS (Tailwind via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Configuration Tailwind personnalisée pour notre thème -->
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                cottentin: {
                  sable: '#fefce8', // bg-yellow-50
                  marine: '#1e3a8a', // text-blue-900
                  soleil: '#facc15', // text-yellow-400
                }
              }
            }
          }
        }
    </script>
</head>
<body class="bg-cottentin-sable text-cottentin-marine font-sans antialiased">

    <!-- En-tête de l'application (Bleu Marine, texte Jaune Soleil) -->
    <header class="bg-cottentin-marine text-cottentin-soleil p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-center">🌊 Plages du Cotentin</h1>
        <p class="text-sm text-center text-yellow-100">L'indicateur d'activités de Cotentin Web Studio</p>
    </header>

    <!-- Conteneur principal -->
    <main class="p-4 max-w-md mx-auto mt-4 space-y-6" id="app-container">
        
        <!-- Carte : Pêche à pied -->
        <section class="bg-white rounded-xl shadow p-4 border-l-4 border-orange-400">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-lg">🦀 Pêche à pied</h2>
                <span class="px-3 py-1 bg-orange-100 text-orange-800 rounded-full text-xs font-bold" id="statut-peche">ORANGE</span>
            </div>
            <p class="text-sm text-cottentin-marine" id="message-peche">En attente des coefficients et heures de marée...</p>
        </section>

        <!-- Carte : Plage & Bronzette -->
        <section class="bg-white rounded-xl shadow p-4 border-l-4 border-gray-300">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-lg">🏖️ Bronzette & Sable</h2>
                <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold" id="statut-plage">À CALCULER</span>
            </div>
            <p class="text-sm text-cottentin-marine" id="message-plage">Croisement météo et vent en cours...</p>
        </section>

    </main>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
    
    <!-- Enregistrement du Service Worker (Pas de changement ici, mais à noter) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker enregistré !', reg.scope))
                    .catch(err => console.error('Erreur SW :', err));
            });
        }
    </script>
</body>
</html>
